<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Budget Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --border2: #333;
    --text: #e8e8e8;
    --muted: #666;
    --muted2: #888;
    --accent: #00ff88;
    --accent2: #00cc6e;
    --red: #ff4444;
    --yellow: #ffcc00;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }

  body {
    font-family: var(--mono);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 13px;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .logo {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 600;
  }
  .logo span { color: var(--muted2); font-weight: 400; }
  #file-label {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: transparent;
    border: 1px solid var(--border2);
    color: var(--muted2);
    padding: 7px 16px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }
  #file-label:hover { border-color: var(--accent); color: var(--accent); }
  #file-input { display: none; }
  #month-label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
  }

  /* ── UPLOAD STATE ── */
  #upload-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: calc(100vh - 57px);
    gap: 16px;
  }
  .upload-box {
    border: 1px dashed var(--border2);
    padding: 64px 80px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .upload-box:hover { border-color: var(--accent); }
  .upload-box.drag { border-color: var(--accent); background: rgba(0,255,136,0.03); }
  .upload-box h2 { font-family: var(--sans); font-weight: 300; font-size: 1.3rem; margin-bottom: 8px; color: var(--text); }
  .upload-box p { font-size: 11px; color: var(--muted); letter-spacing: 0.05em; }
  .upload-box .arrow { font-size: 2rem; color: var(--accent); margin-bottom: 16px; }

  /* ── DASHBOARD ── */
  #dashboard { display: none; padding: 28px 32px; max-width: 1200px; margin: 0 auto; }

  /* SUMMARY ROW */
  .summary-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    margin-bottom: 28px;
  }
  .stat {
    background: var(--surface);
    padding: 18px 22px;
  }
  .stat .lbl {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .stat .val {
    font-size: 1.6rem;
    font-weight: 600;
    color: var(--text);
    line-height: 1;
  }
  .stat .sub { font-size: 10px; color: var(--muted); margin-top: 5px; }
  .stat .val.green { color: var(--accent); }
  .stat .val.red { color: var(--red); }

  /* GRID */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }

  /* PANEL */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
  }
  .panel-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 18px;
    border-bottom: 1px solid var(--border);
  }
  .panel-head h3 {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted2);
    font-weight: 500;
  }
  .panel-body { padding: 18px; }

  /* CATEGORY BARS */
  .cat-list { display: flex; flex-direction: column; gap: 10px; }
  .cat-row { }
  .cat-top { display: flex; justify-content: space-between; margin-bottom: 4px; font-size: 11px; }
  .cat-name { color: var(--muted2); }
  .cat-amt { color: var(--text); font-weight: 500; }
  .bar-track { background: var(--surface2); height: 5px; border-radius: 0; }
  .bar-fill { height: 5px; background: var(--accent); border-radius: 0; transition: width 0.7s cubic-bezier(.4,0,.2,1); }
  .bar-fill.zero { background: var(--border2); }

  /* UNCATEGORIZED TABLE */
  .unc-table { width: 100%; border-collapse: collapse; font-size: 11px; }
  .unc-table th {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    text-align: left;
    padding: 0 0 10px 0;
    border-bottom: 1px solid var(--border);
    font-weight: 500;
  }
  .unc-table td {
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    color: var(--muted2);
    vertical-align: top;
  }
  .unc-table tr:last-child td { border-bottom: none; }
  .unc-table td:last-child { text-align: right; color: var(--yellow); font-weight: 500; }
  .unc-table td.desc { color: var(--text); max-width: 320px; }

  /* FULL CATEGORY TABLE */
  .full-table { width: 100%; border-collapse: collapse; font-size: 11px; }
  .full-table th {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    text-align: left;
    padding: 0 12px 10px 0;
    border-bottom: 1px solid var(--border);
    font-weight: 500;
  }
  .full-table td {
    padding: 9px 12px 9px 0;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  .full-table tr:last-child td { border-bottom: none; }
  .full-table td.amt { text-align: right; font-weight: 600; }
  .full-table td.amt.nonzero { color: var(--accent); }
  .full-table td.amt.zero { color: var(--muted); }
  .full-table td.pct { text-align: right; color: var(--muted); width: 52px; }
  .full-table .mini-bar { width: 80px; }
  .mini-track { background: var(--surface2); height: 3px; }
  .mini-fill { height: 3px; background: var(--accent); transition: width 0.7s; }

  .tag {
    display: inline-block;
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 2px 6px;
    border: 1px solid var(--border2);
    color: var(--muted);
    border-radius: 0;
  }

  .section-full { margin-bottom: 20px; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  .panel { animation: fadeIn 0.35s ease both; }
  .panel:nth-child(2) { animation-delay: 0.05s; }
  .panel:nth-child(3) { animation-delay: 0.1s; }
</style>
</head>
<body>

<header>
  <div class="logo">Budget<span>/</span>Dashboard</div>
  <div id="month-label"></div>
  <label id="file-label" for="file-input">⬆ Upload CSV</label>
  <input type="file" id="file-input" accept=".csv"/>
</header>

<div id="upload-state">
  <div class="upload-box" id="drop-zone">
    <div class="arrow">↓</div>
    <h2>Drop your expenses CSV here</h2>
    <p>Date, Description, Amount — same format as your Amex Gold export</p>
  </div>
</div>

<div id="dashboard"></div>

<script>
// ── EXACT PATTERN DICT FROM YOUR PYTHON SCRIPT ──
const PATTERN_DICT = {
  "car-maintenance":    /volkswagen|car wash|autozone/i,
  "car-registration":   /AZ mvd fee/i,
  "car-gas":            /gas|cefco|aafes|circle|love's|shell|texaco|sunoco|buc-ee|exxon|chevron|oil/i,
  "car-parking":        /parking|msy\/pfc|park|garage|metro|meter/i,
  "clothing":           /lululemon|saks|nordstrom/i,
  "books":              /thrift|book/i,
  "hobbies":            /golf|country|vail|pro/i,
  "other-entertainment":/theatre/i,
  "vacation":           /airlines|hotel|suite|inn|hampton|wyndham|marriot|spirit|delta|united|airbnb|rental|skiplagged|amtrak/i,
  "dining-out":         /restaurant|restauran|bar|cafe|house|creamery|kreme|resy|dining|whiskey|dessert|bourbon|smoothie|uptown|eats|waffle|eggie|donut|babs|frita|asian|korean|vietnamese|mexican|india|bbq|italia|bavarian|chinese|greek|pizza|food|drink|chipotle|5guys|in-n-out|starbucks|chick|dfac/i,
  "groceries":          /foods|wholefds|publix|wal-mart|walmart\.com|safeway|costco|club|commissary|wiggly|trader/i,
  "walgreens-cvs-exchange": /walgreens|cvs|exchange|patriot/i,
  "hair":               /cuts|clips|salon/i,
  "amazon-target":      /amazon|target/i,
  "streaming":          /disney|peacock|hulu|netflix|entertainment/i,
  "spotify":            /spotify/i,
  "rideshare":          /uber|lyft|doordash|instacart/i,
  "genAI":              /claude|chatgpt/i,
  "random":             /michaels|home depot/i,
  "gifts":              /flowers|usps/i,
  "phone":              /apple\.com/i,
  "electronics":        /bestbuy|best buy/i,
};

// ── CSV PARSER ──
function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  const header = lines[0].split(',').map(h => h.trim().toLowerCase());
  const dateI = header.findIndex(h => h.includes('date'));
  const descI = header.findIndex(h => h.includes('desc'));
  const amtI  = header.findIndex(h => h.includes('amount') || h.includes('amt'));

  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const cols = splitLine(lines[i]);
    if (cols.length <= Math.max(dateI, descI, amtI)) continue;
    const amt = parseFloat(cols[amtI]);
    if (isNaN(amt)) continue;
    rows.push({ date: cols[dateI].trim(), desc: cols[descI].trim(), amount: amt });
  }
  return rows;
}

function splitLine(line) {
  const res = []; let cur = '', inQ = false;
  for (const c of line) {
    if (c === '"') { inQ = !inQ; continue; }
    if (c === ',' && !inQ) { res.push(cur); cur = ''; continue; }
    cur += c;
  }
  res.push(cur);
  return res;
}

// ── REPLICATE PYTHON LOGIC ──
function runScript(rows) {
  // Filter out mobile payments (cleaner)
  rows = rows.filter(r => !r.desc.includes('MOBILE PAYMENT - THANK YOU'));
  // Only positive amounts (expenses)
  rows = rows.filter(r => r.amount > 0);

  // groupby Description, sum Amount (like pandas groupby)
  const grouped = {};
  for (const r of rows) {
    grouped[r.desc] = (grouped[r.desc] || 0) + r.amount;
  }

  // categorize
  const results = {};
  for (const cat of Object.keys(PATTERN_DICT)) results[cat] = 0;

  let remaining = { ...grouped };
  let totalCategorized = 0;

  for (const [cat, pattern] of Object.entries(PATTERN_DICT)) {
    for (const [desc, amt] of Object.entries(remaining)) {
      if (pattern.test(desc)) {
        results[cat] += amt;
        totalCategorized += amt;
        delete remaining[desc];
      }
    }
  }

  const uncategorized = Object.entries(remaining).map(([desc, amt]) => ({ desc, amount: amt }));
  const uncategorizedTotal = uncategorized.reduce((s, r) => s + r.amount, 0);

  return { results, totalCategorized, uncategorized, uncategorizedTotal };
}

// ── GROUP DEFINITIONS ──
const GROUP_BUDGETS = {
  "Car":           200,
  "Entertainment": 625,
  "Food":          625,
  "Health":        30,
  "Subscriptions": 40,
  "Rideshare":     100,
  "Shopping":      90,
  "Miscellaneous": 75,
};
const TOTAL_BUDGET = 1785;

const GROUPS = {
  "Car":           ["car-maintenance","car-registration","car-gas","car-parking"],
  "Entertainment": ["clothing","books","hobbies","other-entertainment","vacation"],
  "Food":          ["dining-out","groceries"],
  "Health":        ["hair"],
  "Subscriptions": ["genAI","spotify","streaming"],
  "Rideshare":     ["rideshare"],
  "Shopping":      ["walgreens-cvs-exchange","amazon-target"],
  "Miscellaneous": ["random","gifts","phone","electronics"],
};

// ── RENDER ──
function fmt(n) {
  return '$' + n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}

function render(rows, filename) {
  const { results, totalCategorized, uncategorized, uncategorizedTotal } = runScript(rows);

  // date range
  const dates = rows.filter(r=>r.amount>0 && !r.desc.includes('MOBILE PAYMENT')).map(r=>r.date).sort();
  const period = dates.length ? dates[0] + ' – ' + dates[dates.length-1] : '';
  document.getElementById('month-label').textContent = period;

  const grandTotal = totalCategorized + uncategorizedTotal;
  const maxAmt = Math.max(...Object.values(results));

  // sort categories by amount desc
  const sorted = Object.entries(results).sort((a,b) => b[1]-a[1]);
  const nonzero = sorted.filter(([,v]) => v > 0);
  const zero    = sorted.filter(([,v]) => v === 0);

  const dash = document.getElementById('dashboard');
  dash.innerHTML = `
    <!-- SUMMARY -->
    <div class="summary-row">
      <div class="stat">
        <div class="lbl">Total Categorized</div>
        <div class="val">${fmt(totalCategorized)}</div>
        <div class="sub">${nonzero.length} active categories</div>
      </div>
      <div class="stat">
        <div class="lbl">Uncategorized</div>
        <div class="val ${uncategorizedTotal > 0 ? 'red' : ''}">${fmt(uncategorizedTotal)}</div>
        <div class="sub">${uncategorized.length} transactions</div>
      </div>
      <div class="stat">
        <div class="lbl">Grand Total</div>
        <div class="val">${fmt(grandTotal)}</div>
        <div class="sub">${period}</div>
      </div>
      <div class="stat">
        <div class="lbl">Top Category</div>
        <div class="val green" style="font-size:1rem;padding-top:4px;">${nonzero[0]?nonzero[0][0]:'—'}</div>
        <div class="sub">${nonzero[0] ? fmt(nonzero[0][1]) + ' · ' + (nonzero[0][1]/grandTotal*100).toFixed(1)+'%' : ''}</div>
      </div>
    </div>

    <!-- GROUPED SUMMARY -->
    <div class="section-full panel" style="margin-bottom:20px;">
      <div class="panel-head">
        <h3>Spending Groups — Budget vs. Actual</h3>
        <span style="font-size:10px;color:var(--muted)">
          Total budget: <span style="color:${grandTotal > TOTAL_BUDGET ? 'var(--red)' : 'var(--accent)'}">
            ${fmt(grandTotal)} / ${fmt(TOTAL_BUDGET)}
          </span>
          &nbsp;·&nbsp;
          <span style="color:${grandTotal > TOTAL_BUDGET ? 'var(--red)' : 'var(--accent)'}">
            ${grandTotal > TOTAL_BUDGET ? '▲ over by ' + fmt(grandTotal - TOTAL_BUDGET) : '▼ under by ' + fmt(TOTAL_BUDGET - grandTotal)}
          </span>
        </span>
      </div>
      <div class="panel-body">
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border:1px solid var(--border);">
          ${Object.entries(GROUPS).map(([group, cats]) => {
            const groupTotal = cats.reduce((s, c) => s + (results[c] || 0), 0);
            const budget = GROUP_BUDGETS[group] || 0;
            const pct = budget > 0 ? Math.min(groupTotal / budget * 100, 100) : 0;
            const over = groupTotal > budget;
            const diff = Math.abs(budget - groupTotal);
            const barColor = over ? 'var(--red)' : 'var(--accent)';
            return `
              <div style="background:var(--surface2);padding:16px 18px;">
                <div style="font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;">${group}</div>
                <div style="font-size:1.25rem;font-weight:600;color:${barColor};margin-bottom:2px;">${fmt(groupTotal)}</div>
                <div style="font-size:10px;color:var(--muted);margin-bottom:2px;">budget: ${fmt(budget)}</div>
                <div style="font-size:10px;color:${barColor};margin-bottom:10px;">
                  ${over ? '▲ over by ' + fmt(diff) : '▼ under by ' + fmt(diff)}
                </div>
                <div style="background:var(--border);height:4px;margin-bottom:12px;">
                  <div style="height:4px;background:${barColor};width:${pct.toFixed(1)}%;transition:width 0.7s;"></div>
                </div>
                <div style="display:flex;flex-direction:column;gap:5px;">
                  ${cats.map(c => `
                    <div style="display:flex;justify-content:space-between;font-size:10px;">
                      <span style="color:var(--muted)">${c}</span>
                      <span style="color:${(results[c]||0)>0?'var(--text)':'var(--muted)'}">${fmt(results[c]||0)}</span>
                    </div>
                  `).join('')}
                </div>
              </div>
            `;
          }).join('')}
        </div>
      </div>
    </div>

    <!-- TOP ROW -->
    <div class="grid-2">
      <!-- SPENDING BARS -->
      <div class="panel">
        <div class="panel-head"><h3>Category Breakdown</h3></div>
        <div class="panel-body">
          <div class="cat-list">
            ${nonzero.map(([cat, amt]) => `
              <div class="cat-row">
                <div class="cat-top">
                  <span class="cat-name">${cat}</span>
                  <span class="cat-amt">${fmt(amt)}</span>
                </div>
                <div class="bar-track">
                  <div class="bar-fill" style="width:${(amt/nonzero[0][1]*100).toFixed(1)}%"></div>
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      </div>

      <!-- UNCATEGORIZED -->
      <div class="panel">
        <div class="panel-head">
          <h3>Uncategorized</h3>
          <span style="font-size:10px;color:var(--yellow)">${fmt(uncategorizedTotal)}</span>
        </div>
        <div class="panel-body">
          ${uncategorized.length === 0
            ? '<p style="color:var(--muted);font-size:11px;text-align:center;padding:20px 0">✓ All transactions categorized</p>'
            : `<table class="unc-table">
                <thead><tr><th>Description</th><th style="text-align:right">Amount</th></tr></thead>
                <tbody>
                  ${uncategorized.sort((a,b)=>b.amount-a.amount).map(r=>`
                    <tr>
                      <td class="desc">${esc(r.desc)}</td>
                      <td>${fmt(r.amount)}</td>
                    </tr>
                  `).join('')}
                </tbody>
              </table>`
          }
        </div>
      </div>
    </div>

    <!-- FULL CATEGORY TABLE -->
    <div class="section-full panel">
      <div class="panel-head"><h3>All Categories</h3><span style="font-size:10px;color:var(--muted)">${Object.keys(results).length} total</span></div>
      <div class="panel-body">
        <table class="full-table">
          <thead>
            <tr>
              <th>Category</th>
              <th></th>
              <th style="text-align:right">Amount</th>
              <th style="text-align:right">% of Total</th>
            </tr>
          </thead>
          <tbody>
            ${sorted.map(([cat, amt]) => `
              <tr>
                <td>${cat}</td>
                <td class="mini-bar">
                  <div class="mini-track">
                    <div class="mini-fill" style="width:${maxAmt > 0 ? (amt/maxAmt*100).toFixed(1) : 0}%"></div>
                  </div>
                </td>
                <td class="amt ${amt > 0 ? 'nonzero' : 'zero'}">${fmt(amt)}</td>
                <td class="pct">${grandTotal > 0 ? (amt/grandTotal*100).toFixed(1)+'%' : '—'}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;

  document.getElementById('upload-state').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── FILE HANDLING ──
function handleFile(file) {
  if (!file || !file.name.endsWith('.csv')) return alert('Please upload a CSV file.');
  const reader = new FileReader();
  reader.onload = e => {
    const rows = parseCSV(e.target.result);
    render(rows, file.name);
  };
  reader.readAsText(file);
}

document.getElementById('file-input').addEventListener('change', e => handleFile(e.target.files[0]));

const dz = document.getElementById('drop-zone');
dz.addEventListener('click', () => document.getElementById('file-input').click());
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag'));
dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('drag'); handleFile(e.dataTransfer.files[0]); });
</script>
</body>
</html>
